<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDCA Workflow Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        },
                        accent: {
                            yellow: '#FEF08A',
                        }
                    },
                    gridTemplateColumns: {
                        '14': 'repeat(14, minmax(0, 1fr))',
                    },
                    gridColumn: {
                        'span-14': 'span 14 / span 14',
                        'span-7': 'span 7 / span 7',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col overflow-x-auto">

    <!-- Global Layout Synchronizer (ensures header and content scroll together at high zoom) -->
    <div class="min-w-[1020px] flex flex-col min-h-screen">
        <!-- Header -->
        <header class="bg-white shadow-sm sticky top-0 z-50 backdrop-blur-md bg-opacity-90">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center">
                        <i data-lucide="activity" class="h-8 w-8 text-brand-600 mr-3"></i>
                        <h1 class="text-xl font-bold text-gray-900 tracking-tight">PDCA Tracker</h1>
                    </div>
                    <div class="flex items-center space-x-4">
                        <!-- Data Actions (Export/Import) -->
                        <div id="data-actions" class="flex items-center space-x-1"></div>
                        <!-- Cloud Sync Status -->
                        <div id="sync-status" class="hidden items-center text-xs text-gray-400">
                            <i data-lucide="cloud" class="w-3.5 h-3.5 mr-1"></i>
                            <span id="sync-text">Synced</span>
                        </div>
                        <!-- Auth Section -->
                        <div id="auth-section" class="flex items-center"></div>
                        <!-- Divider -->
                        <div class="h-6 w-[1px] bg-gray-200"></div>
                        <!-- Navigation Tabs -->
                        <nav class="flex space-x-1" aria-label="Tabs" id="nav-tabs">
                            <!-- Tabs will be injected here by app.js -->
                        </nav>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-grow max-w-[98%] mx-auto px-2 sm:px-4 py-4 w-full">
            <div id="app-container"
                class="bg-white rounded-2xl shadow-xl border border-gray-100 min-h-[600px] p-4 md:p-6 transition-all duration-300">
                <!-- Dynamic Component Content -->
            </div>
        </main>

        <!-- Footer -->
        <footer class="bg-white border-t border-gray-200 mt-auto">
            <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
                <p class="text-center text-sm text-gray-500">
                    &copy; 2026 PDCA Workflow Tracker. Cloud Sync Enabled.
                </p>
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script type="module" src="app.js?v=3"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
